          <div class="pin">
            <div class="hiddenDiv"></div>
            <button class="codeBtn" data-value="N">N</button>
            <button class="codeBtn" data-value="S">S</button
            ><button class="codeBtn" data-value="I">I</button>
            <button class="codeBtn" data-value="H">H</button

            <button class="codeBtn" data-value="U">U</button>
